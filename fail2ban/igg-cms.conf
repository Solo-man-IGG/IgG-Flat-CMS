# fail2ban jail for IgG CMS
# 安裝腳本會自動替換 __LOG_PATH__ 為實際路徑

[igg-cms-login]
enabled  = true
port     = http,https
filter   = igg-cms-login
logpath  = __LOG_PATH__/login.log
maxretry = 5
findtime = 900
bantime  = 3600
action   = iptables-multiport[name=igg-cms-login, port="http,https"]

[igg-cms-attack]
enabled  = true
port     = http,https
filter   = igg-cms-attack
logpath  = __LOG_PATH__/attack.log
maxretry = 5
findtime = 600
bantime  = 86400
action   = iptables-multiport[name=igg-cms-attack, port="http,https"]
