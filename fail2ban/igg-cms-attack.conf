# fail2ban filter for IgG CMS attacks
# Matches lines like:
# [2026-06-09 16:30:00] [attack] 192.168.1.100 GET /../../../etc/passwd 400
# [2026-06-09 16:30:00] [attack] 192.168.1.100 GET /wp-admin 404
# [2026-06-09 16:30:00] [attack] 192.168.1.100 POST /?cmd=ls 400

[Definition]

failregex = ^\[.*\] \[attack\] <HOST> (GET|POST|PUT|DELETE|HEAD|OPTIONS) .* (400|401|403|404|405|500)
            ^\[.*\] \[attack\] <HOST> (GET|POST|PUT|DELETE|HEAD|OPTIONS) .*

ignoreregex =
